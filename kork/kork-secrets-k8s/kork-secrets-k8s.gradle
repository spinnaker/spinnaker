apply from: "$rootDir/gradle/lombok.gradle"

dependencies {
  api(platform(project(":spinnaker-dependencies")))

  api project(':kork-secrets')
  implementation("io.kubernetes:client-java") // Legacy... for now :( until services which depend upon this have upgraded to a non-legacy release of the library

  implementation "org.springframework.boot:spring-boot-autoconfigure"
  implementation "org.slf4j:slf4j-api"
  implementation "com.fasterxml.jackson.core:jackson-databind"

  testImplementation "org.assertj:assertj-core"
  testImplementation "org.testcontainers:k3s"
  testImplementation "org.testcontainers:junit-jupiter"
  testImplementation "org.testcontainers:testcontainers"
  testImplementation "org.junit.jupiter:junit-jupiter-api"
  testImplementation "org.mockito:mockito-core"
}
