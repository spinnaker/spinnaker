import groovy.json.JsonSlurper

plugins {
  id "io.spinnaker.artifactregistry-publish"
  id "com.github.node-gradle.node" version "7.0.1"
}

group = "com.netflix.spinnaker.deck-kayenta"

node {
  // Pulls node version from package.json.
  def packageSlurper = new JsonSlurper()
  def packageJson = packageSlurper.parse file('package.json')

  version = packageJson.engines.node.replaceAll(/[^\d\.]/, '')
  pnpmVersion = "11.1.1"
}

task lint(type: PnpmTask) {
  dependsOn "pnpmInstall"

  pnpmCommand = ["lint"]
}

task prettier(type: PnpmTask) {
  dependsOn "lint"

  pnpmCommand = ["prettier:check"]
}

project.tasks.register('runLinters') {
  dependsOn "lint"
  dependsOn "prettier"
}

task test(type: PnpmTask) {
  dependsOn "pnpmInstall"

  pnpmCommand = ["test"]

  if (project.hasProperty('skipTests')) {
    test.enabled = false
  }
}

task webpack(type: PnpmTask) {
  dependsOn "pnpmInstall"

  pnpmCommand = ["build"]
  environment = [
    "NODE_ENV": "production",
    "GATE_HOST": "spinnaker-api-prestaging.prod.netflix.net",
    "NODE_OPTIONS": "--max_old_space_size=8192",
  ]
}
webpack.outputs.dir file('build/webpack')


task build {
  dependsOn "webpack"
  dependsOn "runLinters"
  dependsOn "test"
}
