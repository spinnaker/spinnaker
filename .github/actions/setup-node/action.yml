name: Setup (NodeJS)
description: Installs Node and sets up JS dependencies
author: jcavanagh

inputs:
  project:
    description: Project to setup
    required: true
  node-version:
    description: Node version to set up
    default: "24.13.0"

runs:
  using: "composite"
  steps:
    - uses: actions/setup-node@v5
      if: hashFiles(format('{0}/package.json', inputs.project)) != ''
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install pnpm
      if: hashFiles(format('{0}/package.json', inputs.project)) != ''
      uses: pnpm/action-setup@v4
      with:
        version: 11.1.1
        run_install: false

    - name: Get pnpm store directory
      if: hashFiles(format('{0}/package.json', inputs.project)) != '' && !env.ACT
      id: pnpm-cache
      shell: bash
      run: echo "dir=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

    - name: Restore pnpm store cache
      uses: actions/cache@v4
      if: hashFiles(format('{0}/package.json', inputs.project)) != '' && !env.ACT
      with:
        path: ${{ steps.pnpm-cache.outputs.dir }}
        key: ${{ runner.os }}-pnpm-store-${{ inputs.cache-version }}-${{ hashFiles(format('{0}/pnpm-lock.yaml', inputs.project)) }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-${{ inputs.cache-version }}-
          ${{ runner.os }}-pnpm-store-

    - name: Restore pnpm node_modules cache
      uses: actions/cache@v4
      if: hashFiles(format('{0}/package.json', inputs.project)) != '' && !env.ACT
      with:
        path: ${{ inputs.project }}/node_modules
        key: ${{ runner.os }}-pnpm-modules-${{ inputs.cache-version }}-${{ hashFiles(format('{0}/pnpm-lock.yaml', inputs.project)) }}
        restore-keys: |
          ${{ runner.os }}-pnpm-modules-${{ inputs.cache-version }}-
          ${{ runner.os }}-pnpm-modules-
