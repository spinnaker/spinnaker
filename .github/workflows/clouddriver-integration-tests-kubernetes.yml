name: Clouddriver k8s Integration Tests

on:
  workflow_dispatch:

  push:
    branches:
      - main
      - release-*
    paths:
      - 'clouddriver/**'
      - 'fiat/**'
      - 'kork/**'
      - '.github/workflows/clouddriver-integration-tests-kubernetes.yml'

  pull_request:
    paths:
      - 'clouddriver/**'
      - 'fiat/**'
      - 'kork/**'
      - '.github/workflows/clouddriver-integration-tests-kubernetes.yml'

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Xmx12g -Xms12g

jobs:
  it-test-kubernetes:
    strategy:
      matrix:
        # Node images are the ones shipped with kind v0.31.0 (see KIND_VERSION in
        # clouddriver-kubernetes KubernetesCluster.java); kubectl is the latest patch
        # release of the matching minor version.
        #
        # The base kubectl-version entry runs the oldest supported kubectl against
        # every cluster version to cover version skew; the include entries add a
        # job per cluster version with its matching kubectl.
        kubectl-version:
          - 1.31.14
        kubernetes-image:
          - "kindest/node:v1.35.0@sha256:452d707d4862f52530247495d180205e029056831160e22870e37e3f6c1ac31f"
          - "kindest/node:v1.34.3@sha256:08497ee19eace7b4b5348db5c6a1591d7752b164530a36f855cb0f2bdcbadd48"
          - "kindest/node:v1.33.7@sha256:d26ef333bdb2cbe9862a0f7c3803ecc7b4303d8cea8e814b481b09949d353040"
          - "kindest/node:v1.32.11@sha256:5fc52d52a7b9574015299724bd68f183702956aa4a2116ae75a63cb574b35af8"
          - "kindest/node:v1.31.14@sha256:6f86cf509dbb42767b6e79debc3f2c32e4ee01386f0489b3b2be24b0a55aac2b"
        include:
          - kubectl-version: 1.35.6
            kubernetes-image: "kindest/node:v1.35.0@sha256:452d707d4862f52530247495d180205e029056831160e22870e37e3f6c1ac31f"
          - kubectl-version: 1.34.9
            kubernetes-image: "kindest/node:v1.34.3@sha256:08497ee19eace7b4b5348db5c6a1591d7752b164530a36f855cb0f2bdcbadd48"
          - kubectl-version: 1.33.13
            kubernetes-image: "kindest/node:v1.33.7@sha256:d26ef333bdb2cbe9862a0f7c3803ecc7b4303d8cea8e814b481b09949d353040"
          - kubectl-version: 1.32.13
            kubernetes-image: "kindest/node:v1.32.11@sha256:5fc52d52a7b9574015299724bd68f183702956aa4a2116ae75a63cb574b35af8"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          java-version: |
            17
          distribution: 'zulu'

      - name: Cache on push
        if: github.event_name == 'push'
        uses: actions/cache@v6
        with:
          path: ~/.gradle
          key: ${{ runner.os }}-cd-it-${{ github.sha }}
          # Restore build outputs from the previous commit (if successful), if current commit hasn't run successfully yet
          restore-keys: |
            ${{ runner.os }}-cd-it-${{ github.event.before }}

      - name: Cache on pull_request
        if: github.event_name == 'pull_request'
        uses: actions/cache@v6
        with:
          path: ~/.gradle
          key: ${{ runner.os }}-cd-it-${{ github.event.pull_request.head.sha }}
          restore-keys: |
            ${{ runner.os }}-cd-it-${{ github.event.before }}

      - name: Kubernetes Provider Integration Tests
        run: |
          ./gradlew --build-cache :clouddriver:clouddriver-kubernetes:integrationTest -Pkubernetes-image=${{ matrix.kubernetes-image }} -Pkubectl-version=${{ matrix.kubectl-version }}
