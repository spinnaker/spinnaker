plugins {
  id 'io.spinnaker.project' apply false
  alias(libs.plugins.protobuf) apply false
}

allprojects {
  apply plugin: "io.spinnaker.project"
  group = "io.spinnaker.halyard"
}

subprojects {
  apply plugin: 'java-library'
  apply plugin: 'groovy'

  test {
    useJUnitPlatform()
    testLogging {
      showStandardStreams = false
      exceptionFormat = 'full'
    }
    minHeapSize = "512m"
    maxHeapSize = "512m"
  }

  dependencies {
    implementation enforcedPlatform("io.spinnaker.kork:kork-bom")

    annotationProcessor platform("io.spinnaker.kork:kork-bom")
    annotationProcessor "org.projectlombok:lombok"
    testAnnotationProcessor platform("io.spinnaker.kork:kork-bom")
    testAnnotationProcessor "org.projectlombok:lombok"
    testRuntimeOnly "org.junit.jupiter:junit-jupiter-engine"
    testRuntimeOnly("org.junit.platform:junit-platform-launcher")
  }
}

// Creates scripts for entry points
// Subproject must apply application plugin to be able to call this method.
def createScript(project, mainClass, name) {
  project.tasks.create(name: name, type: CreateStartScripts) {
    outputDir       = project.layout.buildDirectory.dir('scripts').get().asFile
    it.mainClass.set(mainClass)
    applicationName = name
    classpath       = project.tasks[JavaPlugin.JAR_TASK_NAME].outputs.files + project.configurations.runtimeClasspath
  }
  project.tasks[name].dependsOn(project.jar)

  project.applicationDistribution.with {
    into("bin") {
      from(project.tasks[name])
      filePermissions { unix(0755) }
    }
  }
}
