apply plugin: 'java-library'

dependencies {
  implementation project(":cats:cats-core")
  implementation project(":clouddriver-api")

  implementation "com.fasterxml.jackson.core:jackson-databind"
  implementation "io.micrometer:micrometer-core"
  implementation "io.spinnaker.kork:kork-core"
  implementation "org.jooq:jooq"
  implementation "org.springframework.boot:spring-boot-starter-web"
  implementation "io.spinnaker.kork:kork-jedis"
  // The starter (not bare spring-data-redis) matters: it pulls in the lettuce client, without
  // which RedisAutoConfiguration cannot create a RedisConnectionFactory/StringRedisTemplate.
  implementation "org.springframework.boot:spring-boot-starter-data-redis"
  implementation "org.springframework.security:spring-security-core"

  testImplementation "com.h2database:h2"
  testImplementation "org.assertj:assertj-core"
  testImplementation "org.junit.jupiter:junit-jupiter-api"
}

test {
  useJUnitPlatform()
}
