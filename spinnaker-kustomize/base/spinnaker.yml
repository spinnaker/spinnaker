# Enable loading properties files from subdirectories. For example
# - /opt/spinnaker/config/clouddriver.yml
# - /opt/spinnaker/config/mariadb/clouddriver.yml
# - /opt/spinnaker/config/example/clouddriver.yml
# TODO, update kork - https://github.com/spinnaker/kork/blob/08d3f2fc13c4df962c93b668762ae1f8a8dbeb6f/kork-cloud-config-server/src/main/java/com/netflix/spinnaker/kork/configserver/ConfigServerBootstrap.java#L26
spring.config.import: optional:file:/opt/spinnaker/config/*/

services:
  ## Change to whatever domain you're using.  This enables redirect on logins post auth
  deck:
    baseUrl: http://example.com/
    enabled: true
  clouddriver:
    baseUrl: http://clouddriver:7002
    enabled: true
  echo:
    baseUrl: http://echo:8089
    enabled: true
  fiat:
    baseUrl: http://fiat:7003
    ## CANNOT be enabled with basic auth at this time
    enabled: false
  front50:
    baseUrl: http://front50:8080
    enabled: true
  igor:
    baseUrl: http://igor:8088
    enabled: true
  kayenta:
    baseUrl: http://kayenta:8090
    enabled: false
  keel:
    baseUrl: http://keel:7010
    enabled: false
  orca:
    baseUrl: http://orca:8083
    enabled: true
  rosco:
    baseUrl: http://rosco:8087
    enabled: true
