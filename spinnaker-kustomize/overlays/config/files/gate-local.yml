## Set at least a DEFAULT simple username/password to get started
security:
  basicform:
    enabled: true
spring:
  security:
    user:
      name: admin
      password: spinnakerSaysYouShouldChangeYourPassword
      roles: admin

## This starts gate under a PREFIX /api/v1 vs. at the root with a different port.  The ingress
## then routes API traffic to this endpoint.  This bypasses all the CORS headaches AND simplifies deployments
server:
  servlet:
    context-path: /api/v1
  tomcat:
    httpsServerPort: X-Forwarded-Port
    internalProxies: .*
    protocolHeader: X-Forwarded-Proto
    remoteIpHeader: X-Forwarded-For

## ---------------------------------------------------------------------------
## API tokens
## ---------------------------------------------------------------------------
## Long-lived bearer tokens for programmatic Spinnaker API access (CI bots,
## scripts, dashboards). Off by default today; expected to become default-on in
## a future release — flip `enabled: true` to opt in.
##
## Tokens are sent via the X-Spinnaker-Token header (IAP-safe) or
## Authorization: Bearer spk_...   Minting is gated by either Fiat admin OR
## membership in one of the roles under allowed-minting-roles. Service-account
## tokens additionally require the SA to be declared in front50's
## `service-accounts:` config (see front50-local.yml).
api-tokens:
  enabled: false
  ## All values below are optional — shown with their defaults. Uncomment to override.
  ## Token value prefix — used to distinguish from OAuth2 Bearer tokens.
  #token-prefix: spk_
  ## Redis namespace prefix so Gate can share a Redis instance with other services.
  #redis-key-prefix: api-token
  ## Throttle (seconds) for re-checking a token's principal against Fiat — only
  ## consulted when reject-if-no-principal-permissions is true.
  #reject-check-interval-seconds: 60
  ## Maximum lifetime caps. Tokens cannot be extended after mint — operators
  ## revoke + reissue instead.
  #max-user-token-lifetime-days: 90
  #max-service-account-token-lifetime-days: 365
  ## Reject tokens whose owner has been deprovisioned (no Fiat roles).
  #reject-if-no-principal-permissions: false
  ## Fiat roles permitted to mint tokens. Admins always bypass this check.
  #allowed-minting-roles:
  #  - spinnaker-api-users
